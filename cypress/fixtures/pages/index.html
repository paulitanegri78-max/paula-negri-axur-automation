<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Amazon Mock - Home</title>
</head>
<body>
  <header>
    <input id="twotabsearchtextbox" type="search" placeholder="Buscar" />
    <button id="nav-search-submit-button">Pesquisar</button>
  </header>
  <main>
    <h1>Mock Home</h1>
    <p>Esta é uma página mock da Amazon para testes.</p>
  </main>
  <script>
    document.getElementById('nav-search-submit-button').addEventListener('click', function(){
      const q = document.getElementById('twotabsearchtextbox').value || '';
      // navegar para a página de resultados mock
      window.location.href = 'search.html?q=' + encodeURIComponent(q);
    })
  </script>
</body>
</html>
